proxy-providers:
  airport1:
    url: http://192.168.3.6:3001/T3B9dgzBzdRbBF8Aqx7P/download/collection/ProxyA
    type: http
    interval: 0
    override:
      skip-cert-verify: true
      udp: true
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      expected-status: 204
      interval: 333
      timeout: 2000
      lazy: false
  airport2:
    url: http://192.168.3.6:3001/T3B9dgzBzdRbBF8Aqx7P/download/collection/ProxyB
    type: http
    interval: 0
    override:
      skip-cert-verify: true
      udp: true
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      expected-status: 204
      interval: 444
      timeout: 2000
      lazy: false
  airport3:
    url: http://192.168.3.6:3001/T3B9dgzBzdRbBF8Aqx7P/download/collection/ProxyC
    type: http
    interval: 0
    override:
      skip-cert-verify: true
      udp: true
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      expected-status: 204
      interval: 400
      timeout: 2000
      lazy: false

proxies:
  - { name: 直连, type: direct }
  - { name: 拒绝, type: reject }

ntp:
  enable: true
  write-to-system: false
  server: time.apple.com
  port: 123
  interval: 33

x-regex-pool:
  hk: &hk "(?=.*(深港|广港|澳门|广港|香港|Macau|Macao|MO|🇲🇴|HK|Hong Kong|🇭🇰|HongKong)).*$"
  tw: &tw "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)).*$"
  us: &us "(?=.*(广美|美|US|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|拉斯|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$"
  jp: &jp "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea)).*$"
  sg: &sg "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$"
  other: &other "(?i)^((?!(拒绝|直连|澳门|广港|深港|香港|HK|Hong Kong|🇭🇰|广台|台湾|台灣|TW|Taiwan|🇹🇼|广日|日本|JP|Japan|🇯🇵|广新|新加坡|SG|Singapore|🇸🇬|广韩|韩国|韓國|KR|Korea|🇰🇷|广美|美国|美|US|United States|🇺🇸|免费|异常|剩余|官网|订阅|测试|失效|过期|流量|限速|套餐|续费|公告|提示|支持|机场|限免|不可用)).)*$"

default: &default
  type: select
  proxies:
    - 香港-智能
    - 台湾-智能
    - 美国-智能
    - 日韩-智能
    - 新坡-智能
    - 香港-故转
    - 台湾-故转
    - 美国-故转
    - 日韩-故转
    - 新坡-故转
    - 其他-故转
    - 香港-自动
    - 台湾-自动
    - 美国-自动
    - 日韩-自动
    - 新坡-自动

proxy-groups:
  - { name: Google, <<: *default }
  - { name: ChatGPT, <<: *default }
  - { name: Claude, <<: *default }
  - { name: Meta AI, <<: *default }
  - { name: Perplexity, <<: *default }
  - { name: GitHub, <<: *default }
  - { name: Telegram, <<: *default }
  - { name: YouTube, <<: *default }
  - { name: EMBY, <<: *default }
  - { name: Netflix, <<: *default }
  - { name: Apple, <<: *default }
  - { name: Microsoft, <<: *default }
  - { name: Crypto, <<: *default }
  - { name: 国外, <<: *default }
  - { name: 其他, <<: *default }

  - { name: 香港-自动, type: url-test, url: https://www.gstatic.com/generate_204, include-all: true, expected-status: 204, interval: 360, timeout: 2000, lazy: false, tolerance: 80, filter: *hk }
  - { name: 台湾-自动, type: url-test, url: https://www.gstatic.com/generate_204, include-all: true, expected-status: 204, interval: 350, timeout: 2000, lazy: false, tolerance: 80, filter: *tw }
  - { name: 美国-自动, type: url-test, url: https://www.gstatic.com/generate_204, include-all: true, expected-status: 204, interval: 390, timeout: 2000, lazy: false, tolerance: 80, filter: *us }
  - { name: 日韩-自动, type: url-test, url: https://www.gstatic.com/generate_204, include-all: true, expected-status: 204, interval: 380, timeout: 2000, lazy: false, tolerance: 80, filter: *jp }
  - { name: 新坡-自动, type: url-test, url: https://www.gstatic.com/generate_204, include-all: true, expected-status: 204, interval: 320, timeout: 2000, lazy: false, tolerance: 80, filter: *sg }

  - { name: 香港-故转, type: fallback, url: https://www.gstatic.com/generate_204, include-all: true, expected-status: 204, interval: 310, timeout: 2000, max-failed-times: 3, lazy: false, filter: *hk }
  - { name: 台湾-故转, type: fallback, url: https://www.gstatic.com/generate_204, include-all: true, expected-status: 204, interval: 320, timeout: 2000, max-failed-times: 3, lazy: false, filter: *tw }
  - { name: 美国-故转, type: fallback, url: https://www.gstatic.com/generate_204, include-all: true, expected-status: 204, interval: 380, timeout: 2000, max-failed-times: 3, lazy: false, filter: *us }
  - { name: 日韩-故转, type: fallback, url: https://www.gstatic.com/generate_204, include-all: true, expected-status: 204, interval: 390, timeout: 2000, max-failed-times: 3, lazy: false, filter: *jp }
  - { name: 新坡-故转, type: fallback, url: https://www.gstatic.com/generate_204, include-all: true, expected-status: 204, interval: 350, timeout: 2000, max-failed-times: 3, lazy: false, filter: *sg }
  - { name: 其他-故转, type: fallback, url: https://www.gstatic.com/generate_204, include-all: true, expected-status: 204, interval: 350, timeout: 2000, max-failed-times: 3, lazy: false, filter: *other }

  - { name: 香港-智能, type: fallback, url: https://www.gstatic.com/generate_204, expected-status: 204, interval: 450, timeout: 2000, max-failed-times: 3, lazy: false, proxies: [ 香港-手动, 香港-故转, 香港-自动 ] }
  - { name: 台湾-智能, type: fallback, url: https://www.gstatic.com/generate_204, expected-status: 204, interval: 440, timeout: 2000, max-failed-times: 3, lazy: false, proxies: [ 台湾-手动, 台湾-故转, 台湾-自动 ] }
  - { name: 美国-智能, type: fallback, url: https://www.gstatic.com/generate_204, expected-status: 204, interval: 430, timeout: 2000, max-failed-times: 3, lazy: false, proxies: [ 美国-手动, 美国-故转, 美国-自动 ] }
  - { name: 日韩-智能, type: fallback, url: https://www.gstatic.com/generate_204, expected-status: 204, interval: 420, timeout: 2000, max-failed-times: 3, lazy: false, proxies: [ 日韩-手动, 日韩-故转, 日韩-自动 ] }
  - { name: 新坡-智能, type: fallback, url: https://www.gstatic.com/generate_204, expected-status: 204, interval: 410, timeout: 2000, max-failed-times: 3, lazy: false, proxies: [ 新坡-手动, 新坡-故转, 新坡-自动 ] }

  - { name: 香港-手动, type: select, include-all: true, filter: *hk }
  - { name: 台湾-手动, type: select, include-all: true, filter: *tw }
  - { name: 美国-手动, type: select, include-all: true, filter: *us }
  - { name: 日韩-手动, type: select, include-all: true, filter: *jp }
  - { name: 新坡-手动, type: select, include-all: true, filter: *sg }

