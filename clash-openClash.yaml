proxies:
  - { name: 直连, type: direct }
  - { name: 拒绝, type: reject }

ntp:
  enable: true
  write-to-system: false
  server: time.apple.com
  port: 123
  interval: 30

default: &default
  type: select
  proxies:
    - 直连
    - 香港-智能
    - 台湾-智能
    - 美国-智能
    - 新坡-智能
    - 日韩-智能
    - 流量-智能
    - 香港-故转
    - 台湾-故转
    - 美国-故转
    - 新坡-故转
    - 日韩-故转
    - 流量-故转
    - 其他-故转

proxy-groups:
  - { name: ChatGPT, <<: *default }
  - { name: Gemini, <<: *default }
  - { name: Claude, <<: *default }
  - { name: Meta AI, <<: *default }
  - { name: Perplexity, <<: *default }
  - { name: GitHub, <<: *default }
  - { name: Telegram, <<: *default }
  - { name: YouTube, <<: *default }
  - { name: Google, <<: *default }
  - { name: EMBY, <<: *default }
  - { name: Netflix, <<: *default }
  - { name: Microsoft, <<: *default }
  - { name: Apple, <<: *default }
  - { name: Crypto, <<: *default }
  - { name: Test, <<: *default }
  - { name: 国外, <<: *default }
  - { name: 其他, <<: *default }

  - { name: 香港-智能, type: fallback, url: https://www.google-analytics.com/generate_204, expected-status: 204, interval: 360, timeout: 1800, max-failed-times: 3, lazy: false, proxies: [ 香港-手动, 香港-自动, 香港-故转 ] }
  - { name: 台湾-智能, type: fallback, url: https://www.google-analytics.com/generate_204, expected-status: 204, interval: 351, timeout: 1800, max-failed-times: 3, lazy: false, proxies: [ 台湾-手动, 台湾-自动, 台湾-故转 ] }
  - { name: 美国-智能, type: fallback, url: https://www.google-analytics.com/generate_204, expected-status: 204, interval: 342, timeout: 1800, max-failed-times: 3, lazy: false, proxies: [ 美国-手动, 美国-自动, 美国-故转 ] }
  - { name: 日韩-智能, type: fallback, url: https://www.google-analytics.com/generate_204, expected-status: 204, interval: 333, timeout: 1800, max-failed-times: 3, lazy: false, proxies: [ 日韩-手动, 日韩-自动, 日韩-故转 ] }
  - { name: 新坡-智能, type: fallback, url: https://www.google-analytics.com/generate_204, expected-status: 204, interval: 324, timeout: 1800, max-failed-times: 3, lazy: false, proxies: [ 新坡-手动, 新坡-自动, 新坡-故转 ] }
  - { name: 流量-智能, type: fallback, url: https://www.google-analytics.com/generate_204, expected-status: 204, interval: 314, timeout: 1800, max-failed-times: 3, lazy: false, proxies: [ 流量-自动, 流量-故转 ] }

  - { name: 香港-手动, type: select, include-all: true, filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$" }
  - { name: 台湾-手动, type: select, include-all: true, filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)).*$" }
  - { name: 美国-手动, type: select, include-all: true, filter: "(?=.*(广美|美|US|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|拉斯|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$" }
  - { name: 日韩-手动, type: select, include-all: true, filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea)).*$" }
