  - { name: 新坡-自动, type: url-test, url: https://www.google-analytics.com/generate_204, include-all: true, expected-status: 204, interval: 420, timeout: 1800, tolerance: 99, lazy: false, filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$" }
  - { name: 流量-自动, type: url-test, url: https://www.google-analytics.com/generate_204, include-all: true, expected-status: 204, interval: 410, timeout: 1800, tolerance: 99, lazy: false, filter: "^(?=.*(PROXY|牛逼|猫2云))(?!.*(直连|拒绝|剩余|官网|订阅|免费|异常|流量)).*$" }

  - { name: 香港-故转, type: fallback, url: https://www.google-analytics.com/generate_204, include-all: true, expected-status: 204, interval: 410, timeout: 1800, max-failed-times: 3, lazy: false, filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$" }
