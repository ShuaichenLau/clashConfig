# ========================
# 规则列表（按命中率漏斗模型优化）
# ========================
rules:
  # --- 1. 局域网与基础直连 (最高优先级，防止内网泄露或路由死循环) ---
  - RULE-SET,Private_Domain,直连
  - RULE-SET,Private_IP,直连,no-resolve
  - RULE-SET,Direct_Classical,直连

  # --- 2. 高频国内大厂直连 (解决80%日常流量，命中即停，极速放行) ---
  - RULE-SET,Tencent_Domain,直连
  - RULE-SET,Ali_Domain,直连
  - RULE-SET,alibaba_Domain,直连
  - RULE-SET,baidu_Domain,直连
  - RULE-SET,JD_Domain,直连
  - RULE-SET,xiaomi_Domain,直连
  - RULE-SET,huawei_Domain,直连
  - RULE-SET,AppleCN_Domain,直连
  - RULE-SET,BankCN_Domain,直连
  - RULE-SET,Amap_Domain,直连

  # --- 3. 国内全量兜底直连 (处理剩下的国内中低频流量) ---
  - RULE-SET,China_Domain,直连
  - RULE-SET,China_IP,直连,no-resolve

  # --- 4. 特定国外服务 (按日常打开频率排序) ---
  - RULE-SET,Telegram_Domain,Telegram
  - RULE-SET,Telegram_IP,Telegram,no-resolve
  - RULE-SET,Google_Domain,Google
  - RULE-SET,Google_IP,Google,no-resolve
  - RULE-SET,YouTube_Domain,YouTube
  - RULE-SET,GitHub_Domain,GitHub
  - RULE-SET,Apple_Domain,Apple
  - RULE-SET,Microsoft_Domain,Microsoft

  # --- 5. AI 工具专线 ---
  - RULE-SET,ChatGPT_Domain,ChatGPT
  - RULE-SET,Google_Gemini_Domain,Gemini
  - RULE-SET,Claude_Classical,Claude
  - RULE-SET,MetaAI_domain,Meta AI
  - RULE-SET,x_domain,Meta AI
  - RULE-SET,Facebook_IP,Meta AI,no-resolve
  - RULE-SET,Facebook_Domain,Meta AI
  - RULE-SET,Perplexity_Domain,Perplexity

  # --- 6. 流媒体服务 ---
  - RULE-SET,EMBY_Classical_Custom,EMBY
  - RULE-SET,EMBY_Classical_BlackMatrix,EMBY
  - RULE-SET,EMBY_IP,EMBY,no-resolve
  - RULE-SET,Netflix_Domain,Netflix
  - RULE-SET,Netflix_IP,Netflix,no-resolve
  - RULE-SET,Disney_Domain,Netflix
  - RULE-SET,HBO_Domain,Netflix
